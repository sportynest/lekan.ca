- id: "studybuddy"
  title: "StudyBuddy by Cognora"
  short_description: "Flagship AI-powered educational platform of Cognora, built with React and Cloudflare Workers, delivering personalized learning experiences through intelligent AI integration."
  full_description: "StudyBuddy is Cognora's innovative educational platform designed to revolutionize personalized learning. As the founding project of Cognora (cognora.ca), it leverages React for a dynamic frontend and Cloudflare Workers for a serverless backend. The platform seamlessly integrates multiple AI APIs, including Anthropic's Claude, Google's Gemini, and OpenAI's ChatGPT and Several Others, to provide intelligent, context-aware study assistance. Core features include personalized learning experiences, real-time explanations across various subjects, and sophisticated chat-based interactions for in-depth topic exploration."
  full_descriptiontwo: "The platform demonstrates technical excellence through its scalable serverless architecture, enabling real-time AI interactions and future growth. Key features include robust user authentication with JWT and role-based access control, alongside a successful tiered subscription model integrated with Stripe. Advanced capabilities such as PDF document analysis, smart text selection, and version control enhance the learning experience. Strategic performance optimizations including React Query for state management, code splitting, and lazy loading achieved a 40% reduction in load times, while maintaining high security standards through JWT tokens and bcrypt password hashing."
  img: "images/StudyBuddy 1200x675.png"
  github_link: 
  weblink: "https://studdybuddy.ca"

- id: "multi-llm-api-toolkit"
  title: "Multi-LLM API Toolkit"
  short_description: "A lightweight Node.js library for unified API interactions across multiple LLMs (Claude, ChatGPT, Gemini, Grok) with streaming and multi-modal support."
  full_description: "Developed a comprehensive Node.js library that streamlines API interactions across multiple large language models. The toolkit provides a unified interface for Claude, ChatGPT, Gemini, and Grok, featuring standardized streaming capabilities, multi-modal support for text and image inputs, and advanced features like cache control and PDF handling."
  full_descriptiontwo: "Key technical achievements include implementing robust error handling, automatic base64 image conversion, timeout management, and abort controller support. The library features comprehensive test coverage using Jest, and maintains high code quality through ESLint integration. Published as an open-source project under MIT license with detailed documentation and usage examples."
  img:
  github_link: "https://github.com/Cognora/multi-llm-api-toolkit"

- id: "bible-language-model"
  title: "Bible-Based Language Model (TBC)"
  status: "Current Status: NEED COMPUTE"
  short_description: "Developing a specialized T5-based language model for biblical text analysis and generation using PyTorch and Hugging Face Transformers."
  full_description: "This project focuses on creating a sophisticated language model tailored for biblical texts and theological analysis. Utilizing the T5 architecture and PyTorch, I implemented a comprehensive data preprocessing pipeline to handle multiple Bible versions and theological texts. The model is designed to perform various tasks including verse completion, thematic analysis, and contextual interpretation of biblical passages."
  full_descriptiontwo: "A hybrid training approach was employed, leveraging transfer learning from smaller to larger models to optimize performance. Custom evaluation metrics were developed to assess the model's capability in tasks specific to biblical understanding. The evaluation framework provides insights into the model's performance across different aspects of biblical knowledge and interpretation. While initial results show promise in capturing biblical language patterns, ongoing work focuses on refining the model's accuracy and contextual understanding."
